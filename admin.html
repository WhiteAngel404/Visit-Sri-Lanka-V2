<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Visit Sri Lanka</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        
        .admin-page {
            min-height: 100vh;
            padding: 80px 20px 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-card {
            background: white;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 100%;
        }

        .admin-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .admin-card .logo i {
            font-size: 3rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .admin-card .logo h1 {
            color: #1a1a2e;
            font-size: 1.8rem;
        }
        .admin-card .logo p {
            color: #666;
            margin-top: 5px;
        }

        .form-grid { display: flex; flex-direction: column; gap: 18px; }

        .form-field { display: flex; flex-direction: column; }
        .form-field label { font-weight: 500; margin-bottom: 8px; color: #333; }

        .form-field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-field input:focus {
            outline: none;
            border-color: #1a1a2e;
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.1);
        }

        .btn-admin {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-admin:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(26, 26, 46, 0.35); }
        .btn-admin:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .notification {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .notification.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .notification.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .notification.info { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover { color: #1a1a2e; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .auth-loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            z-index: 9999;
        }
        .auth-loading-overlay.hidden { display: none; }
        .auth-loading-overlay i { font-size: 3rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="auth-loading-overlay hidden" id="authLoading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading...</p>
    </div>

    <nav style="background: #1a1a2e; padding: 15px 20px; position: fixed; top: 0; left: 0; right: 0;">
        <div class="container">
            <a href="index.html" class="logo" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-leaf"></i>
                <span style="font-weight: 600;">VisitSriLanka</span>
            </a>
        </div>
    </nav>

    <div class="admin-page">
        <div class="admin-card">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>Admin Portal</h1>
                <p>Visit Sri Lanka Management</p>
            </div>

            <div id="notification" class="notification"></div>

            <form id="adminLoginForm">
                <div class="form-grid">
                    <div class="form-field">
                        <label>Admin Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-field">
                        <label>Password</label>
                        <input type="password" id="adminPassword" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-admin" id="loginBtn">
                    <i class="fas fa-lock"></i> Login to Admin
                </button>
            </form>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, browserSessionPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA6-VDRe0UMkCW5F7n6HcBNW_X3MZHxz8Y",
            authDomain: "visit-sri-lanka-df4d8.firebaseapp.com",
            projectId: "visit-sri-lanka-df4d8",
            messagingSenderId: "107140804406",
            appId: "1:107140804406:web:a888eca0ce422f2f82cd97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Set session persistence
        setPersistence(auth, browserSessionPersistence);

        // YOUR ADMIN EMAIL - Only this email can access admin
        const ADMIN_EMAIL = 'connect.abdulr@gmail.com';

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + type;
            notification.style.display = 'block';
            setTimeout(() => notification.style.display = 'none', 5000);
        }

        function hideLoadingOverlay() {
            document.getElementById('authLoading').classList.add('hidden');
        }

        // Check if already logged in as admin
        async function checkAuth() {
            const overlay = document.getElementById('authLoading');
            overlay.classList.remove('hidden');
            
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            const user = auth.currentUser;
            if (user && user.email === ADMIN_EMAIL) {
                window.location.href = 'admin-dashboard.html';
            } else {
                hideLoadingOverlay();
            }
        }

        checkAuth();

        // Login
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Logging in...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                // Verify admin email
                if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                    throw new Error('unauthorized');
                }
                
                showNotification('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
            } catch (error) {
                console.error('Login error:', error);
                if (error.message === 'unauthorized') {
                    showNotification('Access denied. You are not authorized as admin.', 'error');
                } else {
                    showNotification('Invalid credentials or unauthorized access.', 'error');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-lock"></i> Login to Admin';
            }
        });
    </script>
</body>
</html>
